<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>星辰閃爍</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at center, #101a3a 0%, #050816 45%, #000000 100%);
    }

    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>

  <script>
    const canvas = document.getElementById("sky");
    const ctx = canvas.getContext("2d");

    let stars = [];
    let shootingStars = [];
    const STAR_COUNT = 260;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      createStars();
    }

    class Star {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.r = Math.random() * 1.8 + 0.3;
        this.baseAlpha = Math.random() * 0.5 + 0.2;
        this.alpha = this.baseAlpha;
        this.twinkleSpeed = Math.random() * 0.03 + 0.005;
        this.phase = Math.random() * Math.PI * 2;
      }

      update() {
        this.phase += this.twinkleSpeed;
        this.alpha = this.baseAlpha + Math.sin(this.phase) * 0.35;
        if (this.alpha < 0.05) this.alpha = 0.05;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;

        // 星星光暈
        const glow = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.r * 6
        );
        glow.addColorStop(0, "rgba(255,255,255,1)");
        glow.addColorStop(0.2, "rgba(220,230,255,0.8)");
        glow.addColorStop(1, "rgba(255,255,255,0)");

        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 6, 0, Math.PI * 2);
        ctx.fill();

        // 星點本體
        ctx.fillStyle = "white";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    class ShootingStar {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = Math.random() * canvas.width * 0.8;
        this.y = Math.random() * canvas.height * 0.4;
        this.len = Math.random() * 120 + 80;
        this.speed = Math.random() * 10 + 8;
        this.size = Math.random() * 1.5 + 0.8;
        this.life = 0;
        this.maxLife = Math.random() * 30 + 40;
        this.active = true;
      }

      update() {
        this.x += this.speed;
        this.y += this.speed * 0.35;
        this.life++;
        if (this.life > this.maxLife) {
          this.active = false;
        }
      }

      draw() {
        const tailX = this.x - this.len;
        const tailY = this.y - this.len * 0.35;

        const grad = ctx.createLinearGradient(this.x, this.y, tailX, tailY);
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.2, "rgba(180,220,255,0.8)");
        grad.addColorStop(1, "rgba(255,255,255,0)");

        ctx.save();
        ctx.strokeStyle = grad;
        ctx.lineWidth = this.size;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(tailX, tailY);
        ctx.stroke();
        ctx.restore();
      }
    }

    function createStars() {
      stars = [];
      for (let i = 0; i < STAR_COUNT; i++) {
        stars.push(new Star());
      }
    }

    function drawMoonGlow() {
      const x = canvas.width * 0.82;
      const y = canvas.height * 0.2;
      const radius = 55;

      const glow = ctx.createRadialGradient(x, y, 0, x, y, 140);
      glow.addColorStop(0, "rgba(230,240,255,0.9)");
      glow.addColorStop(0.25, "rgba(180,200,255,0.25)");
      glow.addColorStop(1, "rgba(180,200,255,0)");

      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(x, y, 140, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = "rgba(245,245,255,0.95)";
      ctx.beginPath();
      ctx.arc(x, y, radius, 0, Math.PI * 2);
      ctx.fill();
    }

    function maybeCreateShootingStar() {
      if (Math.random() < 0.008) {
        shootingStars.push(new ShootingStar());
      }
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      drawMoonGlow();

      for (const star of stars) {
        star.update();
        star.draw();
      }

      maybeCreateShootingStar();

      shootingStars.forEach((s) => {
        s.update();
        s.draw();
      });

      shootingStars = shootingStars.filter((s) => s.active);

      requestAnimationFrame(animate);
    }

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    animate();
  </script>
</body>
</html>
