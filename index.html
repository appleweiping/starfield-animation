<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Starfield Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 40%, #0a1f5c 0%, #040b22 35%, #01030a 100%);
      font-family: Arial, sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      position: relative;
    }

    canvas {
      display: block;
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 78% 18%, rgba(180, 205, 255, 0.10), transparent 14%),
        radial-gradient(circle at 20% 70%, rgba(90, 120, 255, 0.06), transparent 25%),
        radial-gradient(circle at 55% 45%, rgba(120, 80, 255, 0.05), transparent 22%);
      mix-blend-mode: screen;
    }

    .hud {
      position: fixed;
      left: 24px;
      bottom: 20px;
      color: rgba(255,255,255,0.72);
      font-size: 14px;
      letter-spacing: 0.5px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 12px rgba(255,255,255,0.12);
      line-height: 1.7;
    }

    .title {
      position: fixed;
      top: 24px;
      left: 24px;
      color: rgba(255,255,255,0.9);
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 1px;
      user-select: none;
      pointer-events: none;
      text-shadow: 0 0 16px rgba(255,255,255,0.10);
    }

    .subtitle {
      position: fixed;
      top: 54px;
      left: 24px;
      color: rgba(200,215,255,0.62);
      font-size: 13px;
      letter-spacing: 0.8px;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="overlay"></div>
  <div class="title">3D Starfield Demo</div>
  <div class="subtitle">Interactive depth visualization with parallax and warp effect</div>
  <div class="hud">Move mouse • Click for warp pulse</div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";

    const container = document.getElementById("app");

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x020611, 0.0017);

    const camera = new THREE.PerspectiveCamera(
      70,
      window.innerWidth / window.innerHeight,
      0.1,
      2000
    );
    camera.position.z = 120;

    const renderer = new THREE.WebGLRenderer({
      antialias: true,
      alpha: true
    });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    container.appendChild(renderer.domElement);

    const mouse = {
      x: 0,
      y: 0,
      tx: 0,
      ty: 0
    };

    let warpPulse = 0;
    const clock = new THREE.Clock();

    // ---------- Star field ----------
    const STAR_COUNT = 9000;
    const starGeometry = new THREE.BufferGeometry();

    const positions = new Float32Array(STAR_COUNT * 3);
    const colors = new Float32Array(STAR_COUNT * 3);
    const sizes = new Float32Array(STAR_COUNT);

    function setStarColor(i, r, g, b) {
      colors[i * 3] = r;
      colors[i * 3 + 1] = g;
      colors[i * 3 + 2] = b;
    }

    for (let i = 0; i < STAR_COUNT; i++) {
      const radius = 200 + Math.random() * 700;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos((Math.random() * 2) - 1);

      const x = radius * Math.sin(phi) * Math.cos(theta);
      const y = radius * Math.sin(phi) * Math.sin(theta) * 0.65;
      const z = (Math.random() - 0.5) * 1600;

      positions[i * 3] = x;
      positions[i * 3 + 1] = y;
      positions[i * 3 + 2] = z;

      const c = Math.random();
      if (c < 0.72) {
        setStarColor(i, 1.0, 1.0, 1.0);
      } else if (c < 0.88) {
        setStarColor(i, 0.82, 0.88, 1.0);
      } else if (c < 0.96) {
        setStarColor(i, 0.68, 0.78, 1.0);
      } else {
        setStarColor(i, 1.0, 0.90, 0.82);
      }

      sizes[i] = Math.random() * 2.2 + 0.6;
    }

    starGeometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
    starGeometry.setAttribute("color", new THREE.BufferAttribute(colors, 3));
    starGeometry.setAttribute("aSize", new THREE.BufferAttribute(sizes, 1));

    const starMaterial = new THREE.ShaderMaterial({
      transparent: true,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      vertexColors: true,
      uniforms: {
        uTime: { value: 0.0 },
        uWarp: { value: 0.0 }
      },
      vertexShader: `
        attribute float aSize;
        varying vec3 vColor;
        varying float vAlpha;

        uniform float uTime;
        uniform float uWarp;

        void main() {
          vColor = color;

          vec3 p = position;

          float twinkle = sin(uTime * 1.5 + position.x * 0.01 + position.z * 0.008) * 0.5 + 0.5;
          vAlpha = 0.45 + twinkle * 0.55;

          float warpStretch = 1.0 + uWarp * clamp((200.0 - abs(p.z)) / 200.0, 0.0, 1.0) * 0.7;

          vec4 mvPosition = modelViewMatrix * vec4(p, 1.0);
          gl_Position = projectionMatrix * mvPosition;

          float size = aSize * (260.0 / -mvPosition.z);
          gl_PointSize = size * warpStretch;
        }
      `,
      fragmentShader: `
        varying vec3 vColor;
        varying float vAlpha;

        void main() {
          vec2 uv = gl_PointCoord - vec2(0.5);
          float d = length(uv);

          float glow = smoothstep(0.5, 0.0, d);
          float core = smoothstep(0.18, 0.0, d);

          vec3 col = vColor * glow + vec3(1.0) * core * 0.35;
          float alpha = glow * vAlpha;

          if (alpha < 0.02) discard;
          gl_FragColor = vec4(col, alpha);
        }
      `
    });

    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // ---------- Galaxy mist ----------
    const mistGroup = new THREE.Group();
    scene.add(mistGroup);

    function createMistSprite(color, opacity, scale, x, y, z) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");

      const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, color.replace("ALPHA", String(opacity)));
      grad.addColorStop(0.35, color.replace("ALPHA", String(opacity * 0.5)));
      grad.addColorStop(1, color.replace("ALPHA", "0"));

      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, 256, 256);

      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.SpriteMaterial({
        map: texture,
        transparent: true,
        depthWrite: false,
        blending: THREE.AdditiveBlending
      });

      const sprite = new THREE.Sprite(material);
      sprite.position.set(x, y, z);
      sprite.scale.set(scale, scale * 0.6, 1);
      mistGroup.add(sprite);
      return sprite;
    }

    const mistSprites = [
      createMistSprite("rgba(90,120,255,ALPHA)", 0.24, 320, -80, 20, -220),
      createMistSprite("rgba(140,100,255,ALPHA)", 0.18, 280, 120, -10, -300),
      createMistSprite("rgba(80,150,255,ALPHA)", 0.16, 240, 30, 55, -180)
    ];

    // ---------- Moon ----------
    function createMoonTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 512;
      canvas.height = 512;
      const ctx = canvas.getContext("2d");

      const glow = ctx.createRadialGradient(256, 256, 20, 256, 256, 240);
      glow.addColorStop(0, "rgba(255,255,255,1)");
      glow.addColorStop(0.35, "rgba(230,235,245,1)");
      glow.addColorStop(0.7, "rgba(210,215,230,0.95)");
      glow.addColorStop(1, "rgba(180,190,220,0)");

      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, 512, 512);

      ctx.globalAlpha = 0.12;
      ctx.fillStyle = "#8e95aa";
      ctx.beginPath();
      ctx.arc(200, 220, 28, 0, Math.PI * 2);
      ctx.arc(315, 280, 20, 0, Math.PI * 2);
      ctx.arc(270, 165, 14, 0, Math.PI * 2);
      ctx.fill();

      return new THREE.CanvasTexture(canvas);
    }

    const moonTexture = createMoonTexture();
    const moonMaterial = new THREE.SpriteMaterial({
      map: moonTexture,
      transparent: true,
      depthWrite: false
    });
    const moon = new THREE.Sprite(moonMaterial);
    moon.position.set(150, 82, -140);
    moon.scale.set(95, 95, 1);
    scene.add(moon);

    // ---------- Warp ring ----------
    const ringGeometry = new THREE.RingGeometry(8, 8.8, 64);
    const ringMaterial = new THREE.MeshBasicMaterial({
      color: 0xbfd8ff,
      transparent: true,
      opacity: 0,
      side: THREE.DoubleSide,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const ring = new THREE.Mesh(ringGeometry, ringMaterial);
    ring.position.z = 20;
    scene.add(ring);

    // ---------- Star streaks ----------
    const streakCount = 22;
    const streakGroup = new THREE.Group();
    scene.add(streakGroup);

    const streaks = [];
    for (let i = 0; i < streakCount; i++) {
      const geo = new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, 0, 0),
        new THREE.Vector3(0, -18, 0)
      ]);
      const mat = new THREE.LineBasicMaterial({
        color: 0xdde8ff,
        transparent: true,
        opacity: 0
      });
      const line = new THREE.Line(geo, mat);
      line.visible = false;
      streakGroup.add(line);
      streaks.push(line);
    }

    function triggerWarpStreaks() {
      streaks.forEach((line, i) => {
        const x = (Math.random() - 0.5) * 220;
        const y = (Math.random() - 0.5) * 140;
        const z = Math.random() * 100 - 50;

        line.position.set(x, y, z);
        line.rotation.z = (Math.random() - 0.5) * 0.25;
        line.scale.set(1, 1 + Math.random() * 4, 1);
        line.material.opacity = 0.7 - i * 0.015;
        line.visible = true;
      });
    }

    // ---------- Interaction ----------
    window.addEventListener("mousemove", (e) => {
      mouse.tx = (e.clientX / window.innerWidth) * 2 - 1;
      mouse.ty = -(e.clientY / window.innerHeight) * 2 + 1;
    });

    window.addEventListener("mouseleave", () => {
      mouse.tx = 0;
      mouse.ty = 0;
    });

    window.addEventListener("click", () => {
      warpPulse = 1.0;
      triggerWarpStreaks();
    });

    // ---------- Resize ----------
    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    }
    window.addEventListener("resize", onResize);

    // ---------- Animation ----------
    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      mouse.x += (mouse.tx - mouse.x) * 0.045;
      mouse.y += (mouse.ty - mouse.y) * 0.045;

      camera.position.x = mouse.x * 18;
      camera.position.y = mouse.y * 10;
      camera.lookAt(0, 0, -220);

      stars.rotation.y += 0.00035;
      stars.rotation.x += 0.00008;
      stars.position.x = mouse.x * 10;
      stars.position.y = mouse.y * 6;

      starMaterial.uniforms.uTime.value = elapsed;

      if (warpPulse > 0.001) {
        warpPulse *= 0.93;
      } else {
        warpPulse = 0;
      }
      starMaterial.uniforms.uWarp.value = warpPulse;

      mistGroup.rotation.z += 0.0004;
      mistSprites[0].position.x = -80 + mouse.x * 8;
      mistSprites[0].position.y = 20 + mouse.y * 5;
      mistSprites[1].position.x = 120 + mouse.x * 12;
      mistSprites[1].position.y = -10 + mouse.y * 6;
      mistSprites[2].position.x = 30 + mouse.x * 7;
      mistSprites[2].position.y = 55 + mouse.y * 4;

      moon.position.x = 150 + mouse.x * 6;
      moon.position.y = 82 + mouse.y * 4;

      ring.position.x = mouse.x * 28;
      ring.position.y = mouse.y * 16;
      ring.scale.setScalar(1 + (1 - warpPulse) * 18);
      ring.material.opacity = warpPulse * 0.35;

      streaks.forEach((line) => {
        if (!line.visible) return;
        line.position.z += 7 + warpPulse * 16;
        line.material.opacity *= 0.93;
        if (line.material.opacity < 0.03) {
          line.visible = false;
          line.material.opacity = 0;
        }
      });

      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
