<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Starfield</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #020617;
      font-family: Arial, sans-serif;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      cursor: crosshair;
    }

    .hint {
      position: fixed;
      left: 24px;
      bottom: 20px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      letter-spacing: 0.5px;
      user-select: none;
      pointer-events: none;
      z-index: 10;
      text-shadow: 0 0 10px rgba(255,255,255,0.15);
    }
  </style>
</head>
<body>
  <canvas id="sky"></canvas>
  <div class="hint">Move mouse • Click to create ripple</div>

  <script>
    const canvas = document.getElementById("sky");
    const ctx = canvas.getContext("2d");

    let width = window.innerWidth;
    let height = window.innerHeight;
    let dpr = Math.min(window.devicePixelRatio || 1, 2);

    const mouse = {
      x: width / 2,
      y: height / 2,
      tx: width / 2,
      ty: height / 2
    };

    const starsFar = [];
    const starsMid = [];
    const starsNear = [];
    const nebulas = [];
    const shootingStars = [];
    const ripples = [];

    const FAR_COUNT = 180;
    const MID_COUNT = 110;
    const NEAR_COUNT = 45;
    const NEBULA_COUNT = 3;

    function resizeCanvas() {
      width = window.innerWidth;
      height = window.innerHeight;
      dpr = Math.min(window.devicePixelRatio || 1, 2);

      canvas.width = width * dpr;
      canvas.height = height * dpr;
      canvas.style.width = width + "px";
      canvas.style.height = height + "px";
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

      createScene();
    }

    function randomBetween(min, max) {
      return Math.random() * (max - min) + min;
    }

    function pickStarColor() {
      const r = Math.random();
      if (r < 0.72) return "255,255,255";
      if (r < 0.88) return "210,225,255";
      if (r < 0.96) return "190,215,255";
      return "255,235,210";
    }

    class Star {
      constructor(layer) {
        this.layer = layer;
        this.reset();
      }

      reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;

        if (this.layer === "far") {
          this.radius = randomBetween(0.35, 1.0);
          this.parallax = 0.010;
          this.baseAlpha = randomBetween(0.15, 0.45);
          this.glow = randomBetween(2, 5);
        } else if (this.layer === "mid") {
          this.radius = randomBetween(0.8, 1.8);
          this.parallax = 0.022;
          this.baseAlpha = randomBetween(0.35, 0.7);
          this.glow = randomBetween(5, 10);
        } else {
          this.radius = randomBetween(1.6, 3.2);
          this.parallax = 0.045;
          this.baseAlpha = randomBetween(0.55, 0.95);
          this.glow = randomBetween(10, 18);
        }

        this.alpha = this.baseAlpha;
        this.phase = Math.random() * Math.PI * 2;
        this.speed = randomBetween(0.004, 0.02);
        this.color = pickStarColor();
        this.pulseBoost = Math.random() < 0.08;
      }

      update() {
        this.phase += this.speed;
        const twinkle = Math.sin(this.phase) * 0.22;
        const pulse = this.pulseBoost ? Math.sin(this.phase * 0.45) * 0.08 : 0;
        this.alpha = Math.max(0.05, this.baseAlpha + twinkle + pulse);
      }

      draw() {
        const offsetX = (mouse.x - width / 2) * this.parallax;
        const offsetY = (mouse.y - height / 2) * this.parallax;

        const px = this.x + offsetX;
        const py = this.y + offsetY;

        ctx.save();
        ctx.globalAlpha = this.alpha;

        const g = ctx.createRadialGradient(px, py, 0, px, py, this.glow);
        g.addColorStop(0, `rgba(${this.color},1)`);
        g.addColorStop(0.35, `rgba(${this.color},0.38)`);
        g.addColorStop(1, `rgba(${this.color},0)`);

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(px, py, this.glow, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = `rgba(${this.color},1)`;
        ctx.beginPath();
        ctx.arc(px, py, this.radius, 0, Math.PI * 2);
        ctx.fill();

        if (this.layer === "near" && this.radius > 2.2) {
          ctx.strokeStyle = `rgba(${this.color},0.18)`;
          ctx.lineWidth = 0.6;
          ctx.beginPath();
          ctx.moveTo(px - this.radius * 3, py);
          ctx.lineTo(px + this.radius * 3, py);
          ctx.moveTo(px, py - this.radius * 3);
          ctx.lineTo(px, py + this.radius * 3);
          ctx.stroke();
        }

        ctx.restore();
      }
    }

    class Nebula {
      constructor() {
        this.reset();
      }

      reset() {
        this.x = randomBetween(width * 0.18, width * 0.82);
        this.y = randomBetween(height * 0.2, height * 0.78);
        this.rx = randomBetween(180, 320);
        this.ry = randomBetween(140, 260);
        this.parallax = randomBetween(0.008, 0.015);
        this.alpha = randomBetween(0.06, 0.12);
        this.hue = Math.random() < 0.5 ? "70,110,255" : "120,90,255";
      }

      draw() {
        const offsetX = (mouse.x - width / 2) * this.parallax;
        const offsetY = (mouse.y - height / 2) * this.parallax;

        const x = this.x + offsetX;
        const y = this.y + offsetY;

        ctx.save();
        ctx.globalAlpha = this.alpha;

        const grad = ctx.createRadialGradient(x, y, 0, x, y, this.rx);
        grad.addColorStop(0, `rgba(${this.hue},0.34)`);
        grad.addColorStop(0.4, `rgba(${this.hue},0.12)`);
        grad.addColorStop(1, `rgba(${this.hue},0)`);

        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.ellipse(x, y, this.rx, this.ry, Math.PI / 5, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    class ShootingStar {
      constructor(x = null, y = null, angle = null) {
        this.x = x ?? randomBetween(-100, width * 0.7);
        this.y = y ?? randomBetween(-30, height * 0.45);
        this.angle = angle ?? randomBetween(0.38, 0.62);
        this.speed = randomBetween(12, 18);
        this.length = randomBetween(140, 220);
        this.life = 0;
        this.maxLife = randomBetween(28, 50);
        this.active = true;
        this.thickness = randomBetween(1.0, 2.0);
      }

      update() {
        this.x += Math.cos(this.angle) * this.speed;
        this.y += Math.sin(this.angle) * this.speed;
        this.life += 1;
        if (this.life > this.maxLife) this.active = false;
      }

      draw() {
        const tx = this.x - Math.cos(this.angle) * this.length;
        const ty = this.y - Math.sin(this.angle) * this.length;

        ctx.save();
        const grad = ctx.createLinearGradient(this.x, this.y, tx, ty);
        grad.addColorStop(0, "rgba(255,255,255,1)");
        grad.addColorStop(0.15, "rgba(210,230,255,0.9)");
        grad.addColorStop(0.55, "rgba(140,190,255,0.28)");
        grad.addColorStop(1, "rgba(255,255,255,0)");

        ctx.strokeStyle = grad;
        ctx.lineWidth = this.thickness;
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(tx, ty);
        ctx.stroke();
        ctx.restore();
      }
    }

    class Ripple {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.r = 0;
        this.maxR = randomBetween(90, 150);
        this.alpha = 0.45;
        this.active = true;
      }

      update() {
        this.r += 2.8;
        this.alpha *= 0.972;
        if (this.r > this.maxR || this.alpha < 0.02) {
          this.active = false;
        }
      }

      draw() {
        ctx.save();
        ctx.strokeStyle = `rgba(170,210,255,${this.alpha})`;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = `rgba(255,255,255,${this.alpha * 0.45})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r * 0.68, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();
      }
    }

    function createScene() {
      starsFar.length = 0;
      starsMid.length = 0;
      starsNear.length = 0;
      nebulas.length = 0;
      shootingStars.length = 0;
      ripples.length = 0;

      for (let i = 0; i < FAR_COUNT; i++) starsFar.push(new Star("far"));
      for (let i = 0; i < MID_COUNT; i++) starsMid.push(new Star("mid"));
      for (let i = 0; i < NEAR_COUNT; i++) starsNear.push(new Star("near"));
      for (let i = 0; i < NEBULA_COUNT; i++) nebulas.push(new Nebula());
    }

    function drawBackground() {
      const bg = ctx.createLinearGradient(0, 0, 0, height);
      bg.addColorStop(0, "#020617");
      bg.addColorStop(0.45, "#03123b");
      bg.addColorStop(1, "#01030d");
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, width, height);

      const midGlow = ctx.createRadialGradient(
        width * 0.5,
        height * 0.42,
        0,
        width * 0.5,
        height * 0.42,
        Math.max(width, height) * 0.55
      );
      midGlow.addColorStop(0, "rgba(50,90,255,0.08)");
      midGlow.addColorStop(0.45, "rgba(30,60,180,0.04)");
      midGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = midGlow;
      ctx.fillRect(0, 0, width, height);
    }

    function drawMoon() {
      const mx = width * 0.81 + (mouse.x - width / 2) * 0.012;
      const my = height * 0.18 + (mouse.y - height / 2) * 0.012;
      const radius = Math.min(width, height) * 0.07;

      ctx.save();

      const outerGlow = ctx.createRadialGradient(mx, my, 0, mx, my, radius * 2.6);
      outerGlow.addColorStop(0, "rgba(220,230,255,0.22)");
      outerGlow.addColorStop(0.45, "rgba(180,200,255,0.12)");
      outerGlow.addColorStop(1, "rgba(180,200,255,0)");
      ctx.fillStyle = outerGlow;
      ctx.beginPath();
      ctx.arc(mx, my, radius * 2.6, 0, Math.PI * 2);
      ctx.fill();

      const moonGrad = ctx.createRadialGradient(
        mx - radius * 0.25,
        my - radius * 0.28,
        radius * 0.1,
        mx,
        my,
        radius
      );
      moonGrad.addColorStop(0, "rgba(250,250,255,1)");
      moonGrad.addColorStop(0.7, "rgba(230,232,242,1)");
      moonGrad.addColorStop(1, "rgba(212,215,228,1)");

      ctx.fillStyle = moonGrad;
      ctx.beginPath();
      ctx.arc(mx, my, radius, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 0.10;
      ctx.fillStyle = "#8d93a8";
      ctx.beginPath();
      ctx.arc(mx - radius * 0.22, my - radius * 0.10, radius * 0.16, 0, Math.PI * 2);
      ctx.arc(mx + radius * 0.18, my + radius * 0.04, radius * 0.12, 0, Math.PI * 2);
      ctx.arc(mx + radius * 0.02, my - radius * 0.24, radius * 0.08, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function updateAndDrawStars(group) {
      for (const star of group) {
        star.update();
        star.draw();
      }
    }

    function maybeCreateShootingStar() {
      if (Math.random() < 0.0045) {
        shootingStars.push(new ShootingStar());
      }
    }

    function animateMouse() {
      mouse.x += (mouse.tx - mouse.x) * 0.06;
      mouse.y += (mouse.ty - mouse.y) * 0.06;
    }

    function animate() {
      animateMouse();
      drawBackground();

      for (const nebula of nebulas) nebula.draw();

      drawMoon();

      updateAndDrawStars(starsFar);
      updateAndDrawStars(starsMid);
      updateAndDrawStars(starsNear);

      maybeCreateShootingStar();

      for (const s of shootingStars) {
        s.update();
        s.draw();
      }

      for (const ripple of ripples) {
        ripple.update();
        ripple.draw();
      }

      for (let i = shootingStars.length - 1; i >= 0; i--) {
        if (!shootingStars[i].active) shootingStars.splice(i, 1);
      }

      for (let i = ripples.length - 1; i >= 0; i--) {
        if (!ripples[i].active) ripples.splice(i, 1);
      }

      requestAnimationFrame(animate);
    }

    window.addEventListener("mousemove", (e) => {
      mouse.tx = e.clientX;
      mouse.ty = e.clientY;
    });

    window.addEventListener("mouseleave", () => {
      mouse.tx = width / 2;
      mouse.ty = height / 2;
    });

    window.addEventListener("click", (e) => {
      ripples.push(new Ripple(e.clientX, e.clientY));

      if (Math.random() < 0.7) {
        const angle = randomBetween(0.35, 0.8);
        shootingStars.push(
          new ShootingStar(
            e.clientX - randomBetween(60, 160),
            e.clientY - randomBetween(40, 120),
            angle
          )
        );
      }
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    animate();
  </script>
</body>
</html>
